<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streaming API Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Manrope, sans-serif;
        background: #faf9f5;
        margin: 0;
        padding: 24px;
        color: #111;
      }
      .card {
        max-width: 920px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e0d4;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        background: #111;
        color: #fff;
        cursor: pointer;
      }
      pre {
        background: #151515;
        color: #9ee7a7;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
      }
      a {
        color: #1f4fbf;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Streaming API Lab</h1>
      <p>
        Interactive frontend page for the Streaming API lab.
        <a href="/concept.html">Open concept page</a> · <a href="/practice.html">Open practice page</a>
      </p>
      <button id="load">Load lesson from API</button>
      <pre id="out">Ready...</pre>
    </div>
    <script>
      const out = document.getElementById("out");
      document.getElementById("load").addEventListener("click", async () => {
        const r = await fetch("/api/lesson");
        const j = await r.json();
        out.textContent = JSON.stringify(j, null, 2);
      });
    </script>
  </body>
</html>
